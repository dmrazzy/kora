name: Rust Unit Tests

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"
      - "justfile"
      - ".github/workflows/rust-unit.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"
      - "justfile"
      - ".github/workflows/rust-unit.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  CI: true

jobs:
  test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run fmt and clippy
        run: |
          cargo fmt --all -- --check
          cargo clippy -- -D warnings
      - name: Run unit tests
        run: cargo test --workspace --lib
      - name: Run Redis integration tests
        env:
          KORA_REDIS_URL: redis://localhost:6379
        run: cargo test --workspace --lib -- --include-ignored test_redis
